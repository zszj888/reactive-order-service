server:
  port: 8080

spring:
  r2dbc:
    url: r2dbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:flashorder}
    username: ${POSTGRES_USER:flashorder}
    password: ${POSTGRES_PASSWORD:flashorder}
    pool:
      initial-size: 10
      max-size: 50
  docker:
    compose:
      lifecycle-management: start_only
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

logbook:
  include:
    - /orders/**
  exclude:
    - /actuator/**
    - /health/**
  filter.enabled: true
  format.style: json
  strategy: default
  obfuscate:
    headers:
      - Authorization
    parameters:
      - token

logging:
  level:
    com.flashorder: DEBUG
    org.springframework.data.r2dbc: INFO
    org.zalando.logbook: TRACE
  pattern:
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr([%X{correlationId:-} %X{conversationId:-}]){yellow} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
